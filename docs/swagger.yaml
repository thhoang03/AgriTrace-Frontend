components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─────────────────────────────────────────────
  # PARAMETERS
  # ─────────────────────────────────────────────
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    CategoryIdPath:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
    ProductIdPath:
      name: productId
      in: path
      required: true
      schema:
        type: integer
    BatchIdPath:
      name: batchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventIdPath:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InspectionIdPath:
      name: inspectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertificateIdPath:
      name: certificateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RecallIdPath:
      name: recallId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationIdPath:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ImageIdPath:
      name: imageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
    SortDir:
      name: sortDir
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  # ─────────────────────────────────────────────
  # RESPONSES
  # ─────────────────────────────────────────────
  responses:
    SuccessMessage:
      description: Thao tác thành công
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    BadRequest:
      description: Dữ liệu không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Chưa đăng nhập
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Không đủ quyền
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Không tìm thấy dữ liệu
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Trùng dữ liệu hoặc xung đột trạng thái
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Sai nghiệp vụ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Lỗi server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────────
  # SCHEMAS
  # ─────────────────────────────────────────────
  schemas:
    # --- Common ---
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        message:
          type: string
          example: Thực hiện thành công
        timestamp:
          type: string
          format: date-time
          example: "2026-07-07T10:00:00Z"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        timestamp:
          type: string
          format: date-time

    FieldError:
      type: object
      properties:
        field:
          type: string
          example: email
        code:
          type: string
          example: REQUIRED
        message:
          type: string
          example: Email không được để trống

    PagedMeta:
      type: object
      properties:
        totalCount:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 5

    LookupItem:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string

    # --- Auth ---
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: farmer@gmail.com
        password:
          type: string
          format: password
          example: "12345678"

    LoginData:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1...
        refreshToken:
          type: string
          example: refresh_token_value
        user:
          $ref: '#/components/schemas/UserBasic'

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password

    UserBasic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Nguyen Van A
        email:
          type: string
          format: email
          example: farmer@gmail.com
        role:
          type: string
          example: FARMER

    # --- Organizations ---
    OrganizationRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          example: Green Farm
        type:
          type: string
          enum: [FARM, PROCESSOR, DISTRIBUTOR, RETAILER, INSPECTOR_ORG]
          example: FARM
        address:
          type: string
          example: Lam Dong

    OrganizationCreatedData:
      type: object
      properties:
        organizationId:
          type: integer
          example: 10
        name:
          type: string
          example: Green Farm

    OrganizationDetail:
      type: object
      properties:
        organizationId:
          type: integer
          example: 1
        name:
          type: string
          example: Farm ABC
        address:
          type: string
          example: Da Lat
        type:
          type: string
          example: FARM
        status:
          type: string
          example: ACTIVE

    OrganizationListItem:
      type: object
      properties:
        organizationId:
          type: integer
        name:
          type: string
        type:
          type: string
        status:
          type: string

    OrganizationPagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrganizationListItem'

    StatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: INACTIVE

    ActiveStatusRequest:
      type: object
      required: [isActive]
      properties:
        isActive:
          type: boolean
          example: false

    # --- Users ---
    CreateUserRequest:
      type: object
      required: [fullName, email, password, role]
      properties:
        organizationId:
          type: integer
          nullable: true
          example: 1
        fullName:
          type: string
          example: Trần Văn B
        email:
          type: string
          format: email
          example: tranb@gmail.com
        password:
          type: string
          format: password
          example: "12345678"
        role:
          type: string
          enum: [ADMIN, MANAGER, STAFF, FARMER, INSPECTOR, CONSUMER]
          example: FARMER

    UpdateUserRequest:
      type: object
      properties:
        fullName:
          type: string
          example: Nguyễn Văn C
        phone:
          type: string
          example: "098888888"
        role:
          type: string
          enum: [ADMIN, MANAGER, STAFF, FARMER, INSPECTOR, CONSUMER]

    UserStatusRequest:
      type: object
      required: [isActive]
      properties:
        isActive:
          type: boolean
          example: false

    UserDetail:
      type: object
      properties:
        userId:
          type: integer
          example: 1
        fullName:
          type: string
          example: Nguyễn Văn A
        email:
          type: string
          format: email
        role:
          type: string
          example: FARMER
        organizationId:
          type: integer
          example: 1
        phone:
          type: string
          example: "090xxxxxxx"
        isActive:
          type: boolean
          example: true

    UserListItem:
      type: object
      properties:
        userId:
          type: integer
        fullName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        organizationId:
          type: integer
        organizationName:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserPagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/UserListItem'

    # --- Categories ---
    CategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Coffee
        description:
          type: string
          example: Các loại cà phê

    CategoryDetail:
      type: object
      properties:
        categoryId:
          type: integer
          example: 1
        name:
          type: string
          example: Coffee
        description:
          type: string
          example: Sản phẩm cà phê
        isActive:
          type: boolean
          example: true

    CategoryListItem:
      type: object
      properties:
        categoryId:
          type: integer
        name:
          type: string
        description:
          type: string
        isActive:
          type: boolean

    CategoryPagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CategoryListItem'

    # --- Products ---
    ProductRequest:
      type: object
      required: [name, categoryId, unit, organizationId]
      properties:
        name:
          type: string
          example: Cà phê Arabica
        categoryId:
          type: integer
          example: 5
        unit:
          type: string
          example: kg
        organizationId:
          type: integer
          example: 1

    ProductDetail:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        name:
          type: string
          example: Cà phê Arabica
        category:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        unit:
          type: string
          example: kg
        organizationId:
          type: integer
        isActive:
          type: boolean

    ProductListItem:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        unit:
          type: string
        organizationId:
          type: integer
        isActive:
          type: boolean

    ProductPagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ProductListItem'

    # --- Images ---
    ImageUploadRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: Ảnh (jpg/png, tối đa 5MB)
        isPrimary:
          type: boolean
          example: true

    ImageItem:
      type: object
      properties:
        imageId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
          example: https://storage.agritrace.vn/batches/uuid/img1.jpg
        isPrimary:
          type: boolean

    ImageListData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImageItem'

    ImageCreatedData:
      type: object
      properties:
        imageId:
          type: string
          format: uuid
        url:
          type: string
          format: uri

    # --- Batches ---
    CreateBatchRequest:
      type: object
      required: [productId, quantity, unitId, productionDate]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: number
          example: 1000
        unitId:
          type: string
          format: uuid
        productionDate:
          type: string
          format: date
          example: "2026-07-01"
        expiryDate:
          type: string
          format: date
          example: "2026-07-15"
          nullable: true

    UpdateBatchRequest:
      type: object
      properties:
        quantity:
          type: number
          example: 1200
        expiryDate:
          type: string
          format: date
          example: "2026-07-20"

    BatchStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: integer
          example: 2

    BatchCreatedData:
      type: object
      properties:
        batchId:
          type: string
          format: uuid
        batchCode:
          type: string
          example: TOMATO-2026-001
        qrCodeUrl:
          type: string
          format: uri

    QrCodeData:
      type: object
      properties:
        batchId:
          type: string
          format: uuid
        batchCode:
          type: string
          example: TOMATO-2026-001
        qrCodeUrl:
          type: string
          format: uri
        publicTraceUrl:
          type: string
          format: uri

    BatchListItem:
      type: object
      properties:
        batchId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productName:
          type: string
        batchCode:
          type: string
        quantity:
          type: number
        unitId:
          type: string
          format: uuid
        unitCode:
          type: string
        status:
          type: integer
        statusName:
          type: string
        currentOrganizationId:
          type: string
          format: uuid
        qrCodeUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time

    BatchPagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/BatchListItem'

    BatchDetail:
      type: object
      properties:
        batchId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productName:
          type: string
        categoryId:
          type: string
          format: uuid
        categoryName:
          type: string
        batchCode:
          type: string
        quantity:
          type: number
        unitId:
          type: string
          format: uuid
        unitCode:
          type: string
        productionDate:
          type: string
          format: date
        expiryDate:
          type: string
          format: date
          nullable: true
        status:
          type: integer
        currentOrganizationId:
          type: string
          format: uuid
        organizationName:
          type: string
        qrCodeUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time

    # --- Events ---
    CreateEventRequest:
      type: object
      required: [eventTypeId]
      properties:
        eventTypeId:
          type: string
          format: uuid
        eventData:
          type: string
          description: JSON string chứa dữ liệu bổ sung
          example: '{"temperature":25}'
        location:
          type: string
          example: Da Lat

    EventCreatedData:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        previousHash:
          type: string
          example: abc123
        currentHash:
          type: string
          example: xyz789

    EventDetail:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        eventTypeId:
          type: string
          format: uuid
        eventTypeCode:
          type: string
          example: PROCESSING
        organizationId:
          type: string
          format: uuid
        performedByUserId:
          type: string
          format: uuid
        eventData:
          type: string
          example: '{"machine":"M-01"}'
        location:
          type: string
          example: Processor A
        previousHash:
          type: string
        currentHash:
          type: string
        eventTime:
          type: string
          format: date-time

    EventListItem:
      allOf:
        - $ref: '#/components/schemas/EventDetail'

    EventPagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/EventListItem'

    # --- Batch Split & Merge ---
    SplitBatchRequest:
      type: object
      required: [splits]
      properties:
        splits:
          type: array
          minItems: 2
          items:
            type: object
            required: [quantity, unitId]
            properties:
              quantity:
                type: number
                example: 400
              unitId:
                type: string
                format: uuid

    SplitBatchData:
      type: object
      properties:
        parentBatchId:
          type: string
          format: uuid
        childBatchIds:
          type: array
          items:
            type: string
            format: uuid

    MergeBatchRequest:
      type: object
      required: [sourceBatchIds, productId, quantity, unitId, productionDate]
      properties:
        sourceBatchIds:
          type: array
          minItems: 2
          items:
            type: string
            format: uuid
        productId:
          type: string
          format: uuid
        quantity:
          type: number
          example: 1000
        unitId:
          type: string
          format: uuid
        productionDate:
          type: string
          format: date
          example: "2026-07-01"

    MergeBatchData:
      type: object
      properties:
        newBatchId:
          type: string
          format: uuid
        batchCode:
          type: string
          example: MERGED-2026-001

    # --- Inspections ---
    CreateInspectionRequest:
      type: object
      required: [result]
      properties:
        result:
          type: string
          enum: [PASS, FAIL]
          example: PASS
        notes:
          type: string
          example: No pesticide residue detected

    UpdateInspectionRequest:
      type: object
      required: [result]
      properties:
        result:
          type: string
          enum: [PASS, FAIL]
          example: FAIL
        notes:
          type: string
          example: Detected residue above limit

    InspectionDetail:
      type: object
      properties:
        inspectionId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        batchCode:
          type: string
          example: TOMATO-2026-001
        inspectorId:
          type: string
          format: uuid
        inspectorName:
          type: string
          example: Nguyen Van A
        status:
          type: integer
        result:
          type: string
          enum: [PASS, FAIL]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    InspectionPagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/InspectionDetail'

    # --- Certificates ---
    CreateCertificateRequest:
      type: object
      required: [inspectionId, certificateType, fileUrl, issuedDate]
      properties:
        inspectionId:
          type: string
          format: uuid
        certificateType:
          type: string
          example: VietGAP
        fileUrl:
          type: string
          format: uri
          example: https://storage.agritrace.vn/certs/uuid.pdf
        issuedDate:
          type: string
          format: date
          example: "2026-07-07"

    CertificateDetail:
      type: object
      properties:
        certificateId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        batchCode:
          type: string
        inspectionId:
          type: string
          format: uuid
        certificateType:
          type: string
          example: VietGAP
        fileUrl:
          type: string
          format: uri
        issuedDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    CertificatePagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CertificateDetail'

    # --- Recalls ---
    CreateRecallRequest:
      type: object
      required: [batchId, reason, severity]
      properties:
        batchId:
          type: string
          format: uuid
        reason:
          type: string
          example: E. coli contamination detected
        severity:
          type: integer
          minimum: 1
          maximum: 3
          description: 1=LOW, 2=MEDIUM, 3=HIGH
          example: 3

    ResolveRecallRequest:
      type: object
      required: [status]
      properties:
        status:
          type: integer
          example: 3

    RecallDetail:
      type: object
      properties:
        recallId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        batchCode:
          type: string
        createdBy:
          type: string
          format: uuid
        createdByName:
          type: string
        reason:
          type: string
        severity:
          type: integer
        severityName:
          type: string
          example: HIGH
        status:
          type: integer
        statusName:
          type: string
          example: PENDING
        createdAt:
          type: string
          format: date-time

    RecallPagedResponse:
      allOf:
        - $ref: '#/components/schemas/PagedMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/RecallDetail'

    # --- Notifications ---
    NotificationItem:
